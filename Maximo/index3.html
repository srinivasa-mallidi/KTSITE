</p>

</li>

<li>

System prepares <b>Inspection Plan</b> (which tests to perform)
</li>

<li>
<b>MES triggers sampling</b><br>
MES sends TD Shipment file → tells system to create samples
</li>

<li>
<b>Sample Created in LIMS</b><br>
Sample status = <b>Unavailable</b>
</li>

<li>
<b>Label Printing</b><br>
Barcode labels generated for tracking samples
</li>

<li>
<b>Field Sampling</b><br>
Operator collects sample and scans label<br>
✔ Sampled date updated<br>
✔ MES updated
</li>

<li>
<b>Sample Sent to Lab</b><br>
Lab scans sample → status becomes <b>Available</b>
</li>

<li>
<b>Testing in Lab</b><br>
Lab technician performs tests using instrument or manual entry
</li>

<li>
<b>Results Entered</b><br>
Results stored in SampleManager
</li>

<li>
<b>Decision Making</b><br>
System checks results:
<ul>
<li>On-Spec → Accept</li>
<li>Off-Spec → Retest / Waiver / Reject</li>
</ul>
</li>

<li>
<b>Final Updates</b><br>
✔ SAP updated with results and usage decision<br>
✔ MES updated with release status<br>
✔ Sample closed in LIMS
</li>

</ol>
