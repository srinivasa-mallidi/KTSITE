<p class="mb-4 text-gray-600">
A Lot in SampleManager LIMS represents a batch or group of materials/samples that share common characteristics such as source, production batch, or testing requirement. It acts as a parent entity for samples and helps in tracking, processing, and reporting at a batch level.
</p>

<div class="bg-gray-100 p-4 rounded-lg mb-6 text-center font-semibold">

  <li>Acts as parent for multiple samples</li>
  <li>Used for tracking, processing, and reporting</li>
</ul>

A chemical plant produces Batch #B123 → This becomes a LOT → Multiple samples are collected under this lot
